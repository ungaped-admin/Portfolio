<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UN-GAP'ED Launch</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* Background watermark with 95% transparency */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://raw.githubusercontent.com/ungaped-admin/Webimages/main/Icon.png');
      background-repeat: repeat;
      background-size: 150px 150px;
      opacity: 0.05; /* 95% transparent (only 25% visible) */
      z-index: -1; /* keep behind content */
    }

    .logo-container {
      text-align: center;
      padding: 20px;
      z-index: 1;
    }

    .logo-container img {
      max-width: 400px;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="https://raw.githubusercontent.com/ungaped-admin/Webimages/main/Icon.png" alt="Icon">
  </div>
</body>
</html>
